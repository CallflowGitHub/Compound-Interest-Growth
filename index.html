<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compound Interest Growth</title>
  <link rel="stylesheet" href="style/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Compound Interest Growth</h1>

    <div class="dashboard">
      <div class="inputs">
        <div class="input-group">
          <label for="initialAmount">Initial Amount ($)</label>
          <input type="number" id="initialAmount" placeholder="e.g. 10000" min="0" />
        </div>
        <div class="input-group">
          <label for="monthlyAddition">Monthly Addition ($)</label>
          <input type="number" id="monthlyAddition" placeholder="e.g. 500" min="0" />
        </div>
        <div class="input-group">
          <label for="annualRate">Annual Interest Rate (%)</label>
          <input type="number" id="annualRate" placeholder="e.g. 7" min="0" step="0.01" />
        </div>
        <div class="input-group">
          <label for="years">Number of Years</label>
          <input type="number" id="years" placeholder="e.g. 20" min="0.1" max="100" step="0.1" />
        </div>
        <button id="calculateBtn">Calculate Growth</button>
      </div>

      <div class="chart-area" id="chartArea">
        <canvas id="growthChart"></canvas>
      </div>
    </div>

    <div class="summary" id="summary"></div>
  </div>

  <script src="script/script.js"></script>
</body>
</html>
